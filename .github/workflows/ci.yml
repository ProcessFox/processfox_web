name: CI

# Backend-Härtung: fmt + clippy + Unit-Tests + HTTP/DB-Integrationstests
# (CLAUDE.md §13). Die Integrationstests laufen gegen einen Postgres-
# Service-Container; `#[sqlx::test]` legt pro Test eine frische Wegwerf-DB an.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Wartungs-DB; `#[sqlx::test]` erzeugt daraus pro Test eine eigene DB.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: tests (unit + HTTP/DB-Integration)
        run: cargo test --all-targets
